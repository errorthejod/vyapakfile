kind = "web"
previewPath = "/"
title = "Business Buddy"
version = "1.0.0"
id = "artifacts/business-buddy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19274

[services.development]
run = "pnpm --filter @workspace/business-buddy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/business-buddy", "run", "build" ]
publicDir = "artifacts/business-buddy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19274"
BASE_PATH = "/"
